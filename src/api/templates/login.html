<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DASC</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/estilo.css') }}">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-box {
            background: #1e293b;
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,.35);
        }

        .login-box h1 {
            margin-top: 0;
            margin-bottom: 1rem;
        }

        .login-box p {
            color: #cbd5e1;
        }

        .login-box label {
            display: block;
            margin-top: 1rem;
            margin-bottom: .4rem;
        }

        .login-box input {
            width: 100%;
            padding: .8rem;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        .login-box button {
            width: 100%;
            margin-top: 1.2rem;
            padding: .9rem;
            border: 0;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .error {
            margin-top: 1rem;
            background: #7f1d1d;
            padding: .8rem;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Acceso DASC</h1>
        <p>Introduce tus credenciales para entrar al panel.</p>

        <form method="post" action="/login">
            <label for="username">Usuario</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Entrar</button>
        </form>

        {% if error %}
            <div class="error">Usuario o contraseña incorrectos.</div>
        {% endif %}
    </div>
</body>
</html>
